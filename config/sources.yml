# OPTIONAL ADVANCED SOURCES (requires manual setup)
# These platforms (Greenhouse, Lever, Ashby, Workable) don't have public aggregator APIs.
# Instead, they host individual company career pages. To use:
# 1. Greenhouse: Manually add specific company URLs (e.g., google.greenhouse.io/jobs)
# 2. Lever: Manually add specific company URLs (e.g., jobs.lever.co/company)
# 3. Ashby: Same as above
# 4. Workable: Has public API (https://workable.com/developers) but requires auth
#
# Recommended: Use these only if building company-specific integrations.
# For now, stick with aggregator APIs above (Remotive, ArbeitNow, SimplifyJobs).
