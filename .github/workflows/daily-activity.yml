name: Daily Global Tech Roles PR

on:
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-global-tech-roles
  cancel-in-progress: false

jobs:
  daily-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetch pipeline
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/raw log
          python3 scripts/fetch.py

      - name: Update log and timestamp
        shell: bash
        run: |
          set -euo pipefail
          TODAY="$(date -u +'%Y-%m-%d')"
          MONTH="$(date -u +'%Y-%m')"
          MONTH_LABEL="$(date -u +'%B %Y')"
          TIME="$(date -u +'%H:%M:%S UTC')"

          FILE="log/${MONTH}.md"
          if [ ! -f "$FILE" ]; then
            echo "# Log — ${MONTH_LABEL}" > "$FILE"
            echo "" >> "$FILE"
          fi

          grep -q "^\- \[${TODAY}\]" "$FILE" || echo "- [${TODAY}] Global roles snapshot updated at ${TIME}" >> "$FILE"
          echo "${TODAY} ${TIME}" > LAST_UPDATED

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: global tech roles snapshot (${{ github.run_id }})"
          title: "chore: global tech roles snapshot"
          body: |
            Automated daily global tech roles snapshot.
            **Scope:** US, Canada, EMEA (+ remote)
            **Levels:** Internship/New Grad/Junior/Entry/Mid
            **Companies:** Top-tier allowlist only
            
            **Sources:**
            - Remotive API
            - ArbeitNow API
            - SimplifyJobs Internships
            - SimplifyJobs New Grad
            
            **Generated files:**
            - `data/jobs-global.json`
            - `data/jobs-global-latest.md`
            - `data/stats.json`
          branch: "daily/global-roles-${{ github.run_id }}"
          delete-branch: true
          labels: automated

      - name: Auto-merge PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --auto --delete-branch