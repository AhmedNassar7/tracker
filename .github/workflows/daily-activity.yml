name: Frequent Global Tech Roles PR

on:
  schedule:
    - cron: "15 0,4,8,12,16 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: frequent-global-tech-roles
  cancel-in-progress: false

jobs:
  daily-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetch pipeline
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/raw log
          python3 scripts/fetch.py

      - name: Run public opportunity layer
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/public_sources.py

      - name: Update log and timestamp
        shell: bash
        run: |
          set -euo pipefail
          TODAY="$(date -u +'%Y-%m-%d')"
          MONTH="$(date -u +'%Y-%m')"
          MONTH_LABEL="$(date -u +'%B %Y')"
          TIME="$(date -u +'%H:%M:%S UTC')"

          FILE="log/${MONTH}.md"
          if [ ! -f "$FILE" ]; then
            echo "# Log — ${MONTH_LABEL}" > "$FILE"
            echo "" >> "$FILE"
          fi

          echo "- [${TODAY}] Global roles snapshot updated at ${TIME}" >> "$FILE"
          echo "${TODAY} ${TIME}" > LAST_UPDATED

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "chore: global tech roles snapshot (${{ github.run_id }})"
          title: "chore: global tech roles snapshot (${{ github.run_id }})"
          author: "AhmedNassar7 <a.moh.nassar00@users.noreply.github.com>"
          committer: "AhmedNassar7 <a.moh.nassar00@users.noreply.github.com>"
          body: |
            Automated global tech roles snapshot (scheduled 5 times daily).
            
            **Schedule (UTC):** 00:15, 04:15, 08:15, 12:15, 16:15
            **Levels:** Internship/New Grad/Mid
            **Companies:** Top-tier allowlist only
            
            **Sources:**
            - Remotive API
            - ArbeitNow API
            - SimplifyJobs Internships
            - SimplifyJobs New Grad
            - Devpost hackathons
            - Luma discovery pages
            - Greenhouse public job boards
            - Lever public postings
            - Workday public pages (configurable)
            
            **Updated artifacts in this PR:**
            - `data/jobs-global.json`
            - `data/jobs-global-archive.json`
            - `data/stats.json`
            - `data/public-opportunities.json`
            - `data/raw/*.json` (source snapshots)
            - `LAST_UPDATED`
            - `log/YYYY-MM.md`
          branch: "frequent/global-roles-${{ github.run_id }}"
          delete-branch: true
          labels: automated

      - name: Auto-merge PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --auto --delete-branch